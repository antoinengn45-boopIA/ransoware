<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SECURITY ALERT SYSTEM</title>
<style>
body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: black;
    color: #ff2e2e;
    overflow: hidden;
}

#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    animation: flicker 1.5s infinite;
}

@keyframes flicker {
    0% {opacity: 1;}
    50% {opacity: 0.85;}
    100% {opacity: 1;}
}

h1 {
    font-size: 40px;
    text-shadow: 0 0 20px red;
}

#timer {
    font-size: 28px;
    color: white;
    margin-top: 10px;
}

.warning {
    max-width: 700px;
    margin-top: 20px;
    color: #ff6666;
    line-height: 1.5;
}

.box {
    margin-top: 30px;
    padding: 20px;
    border: 2px solid red;
    background: rgba(255,0,0,0.1);
}

input {
    padding: 10px;
    width: 250px;
    border: none;
    outline: none;
    text-align: center;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

#status {
    margin-top: 15px;
    color: yellow;
}
</style>
</head>

<body>

<div id="overlay">

    <h1>⚠ SYSTEM COMPROMISED ⚠</h1>

    <div id="timer">Encryption process: 05:00</div>

    <div class="warning">
        All your files are now part of a <b>SECURITY DEMO ENVIRONMENT</b>.<br>
        This page is only a cybersecurity educational interface.<br><br>

        No real data is affected. No files are accessed.
    </div>

    <div class="box">
        <p>Enter decryption key:</p>
        <input type="text" id="key" placeholder="XXXX-XXXX">
        <br>
        <button onclick="checkKey()">Decrypt</button>
        <div id="status"></div>
    </div>

</div>

<script>
let time = 300;

setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").innerText =
    "Encryption process: " + min + ":" + (sec < 10 ? "0" : "") + sec;
    if(time > 0) time--;
}, 1000);

function checkKey(){
    let key = document.getElementById("key").value;
    let status = document.getElementById("status");

    if(key === "SAFE-KEY"){
        status.style.color = "lime";
        status.innerText = "SYSTEM RESTORED";
        document.body.style.background = "#001a00";
    } else {
        status.style.color = "red";
        status.innerText = "Invalid key - access denied";
    }
}
</script>

</body>
</html>
